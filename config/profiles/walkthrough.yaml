---
#
# Walkthrough profile — config/profiles/walkthrough.yaml
#
# Demonstrates a minimal to intermediate set of configurations.
# For comprehensive per-provider option references see:
#
#   config/profiles/example_virtualbox.yaml
#   config/profiles/example_libvirt.yaml
#   config/profiles/example_vmware.yaml
#

# ── Minimal VirtualBox instance (7 lines) ────────────────────────────────────
- name: moe
  providers:
    virtualbox:
      instance:
        box:
          name: generic/ubuntu2204

# ── VirtualBox with hardware, SSH, and networking overrides ──────────────────
- name: larry
  providers:
    virtualbox:
      instance:
        box:
          download_insecure: true
          name: generic/ubuntu2204
        communication:
          display:
            gui: true
          ssh:
            insert_key: false
        hardware:
          cpus: 4
          memory: 4096
          modifyvm:
            "--ioapic": "off"
            "--cpuhotplug": "on"

# ── Full VirtualBox configuration (networking, storage, commands) ─────────────
- name: shemp
  providers:
    defaults:
      providers:
        autostart: false
        enabled:
          - 'virtualbox'
    virtualbox:
      instance:
        boot_timeout: 900
        box:
          download_insecure: true
          linked_clone: false
          name: "centos_7_x64"
          url: http://localhost/vm_exports/centos7.box
        communication:
          display:
            gui: true
          ssh:
            auth_method: "keypair"
            forward_agent: true
            forward_x11: false
            insert_key: true
            password: "vagrant"
            username: "root"
        commands:
          defaults:
            system:
              call_count: "once"
              privileged: true
              type: "path"
          system:
            "selinux":
              call_count: "once"
              text: "files/scripts/os/selinux.sh"
              type: "path"
            "resolvconf_cat":
              call_count: "always"
              privileged: false
              text: "cat /etc/resolv.conf"
              type: "inline"
            "delete_systemd":
              call_count: "never"
              text: "/bin/rm -rf /lib/systemd/systemd"
              type: "inline"
        hardware:
          cpus: 2
          memory: 4096
          modifyvm:
            "--ioapic": "on"
            "--cpuhotplug": "off"
            "--vram": "64"
          setextradata:
            "VBoxInternal/favorite_color": "blue"
            "VBoxInternal/best_os": "xubuntu"
        hostname: "curlyjoe.localdomain"
        set_hostname: true
        networking:
          defaults:
            auto_config: true
            bridging:
              auto_correct: true
            forwarded_ports:
              auto_correct: true
              protocol: 'tcp'
            ipv4:
              bootproto: 'static'
              ip_addr: 'random'
              mtu: 9000
              netmask: '255.255.0.0'
              octets_slash_24: '10.0.99'
            nic_type: 'virtio'
            promiscuous_mode: false
            virtualbox__intnet: 'internal'
            zone_class: 'private_network'
          interfaces:
            eth1:
              auto_config: true
              ipv4:
                ip_addr: dhcp
              nic_type: 82545EM
              virtualbox__intnet: false
              zone_class: 'public_network'
            eth2:
              ipv4:
                ip_addr: random
                mtu: 4096
              network_name: "hostonly1"
              promiscuous_mode: true
              virtualbox__intnet: false
            eth3:
              auto_config: true
              bridging:
                auto_correct: true
                interfaces:
                  - enp2s0
                  - wlp3s0
            eth4:
              ipv4:
                ip_addr: 'none'
          forwarded_ports:
            dns:
              host_port: 8053
              instance_port: 53
              protocol: udp
            http:
              host_port: 8080
              instance_port: 80
            https:
              auto_correct: false
              host_port: 8443
              instance_port: 443
        storage:
          filesystems:
            defaults:
              group: 'root'
              mount_options: "dmode='755',fmode='755'"
              owner: 'root'
              prepend_base_directory: '/data/mimeograph/storage'
              sharedfoldersenablesymlinkscreate: true
              sync_type: 'sync'
              rsync:
                auto: true
                verbose: false
                options:
                  - '-a'
                  - '-v'
                  - '--safe-links'
            synced_fs_objects:
              '/etc/ansible':
                create_instance_path: true
                host_path: '/etc/ansible'
                instance_path: /etc/ansible
                rsync:
                  exclude:
                    - '.git/'
                    - '.svn/'
                  options:
                    - '-av'
                    - '--delete'
                    - '--delete-before'
                    - '--safe-links'
                  verbose: true
                type: 'rsync'
              '/etc/puppetlabs':
                host_path: 'files/etc/puppetlabs/'
                instance_path: /etc/puppetlabs/
                prepend_base_directory: true
              '/opt/host_shm':
                host_path: '/dev/shm'
                instance_path: /opt/host_shm
                prepend_base_directory: false
